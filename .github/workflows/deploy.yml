name: Docker Laravel Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Laravel Docker App to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Check password secret
        run: |
          if [ -z "${{ secrets.SERVER_PASSWORD }}" ]; then
            echo "SERVER_PASSWORD is missing"
            exit 1
          fi
          echo "Password secret exists"

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Test SSH connection
        env:
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            deploy@192.241.128.37 "echo SSH password login successful"

      - name: Run Docker deployment script on VPS
        env:
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -p "$SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o PreferredAuthentications=password \
            -o PubkeyAuthentication=no \
            deploy@192.241.128.37 "cd /var/www/laravel-docker && ./deploy-docker.sh"
