name: Docker Laravel Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Laravel Docker App to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.SERVER_IP }}" ]; then
            echo "SERVER_IP is missing"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "SERVER_USER is missing"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_PASSWORD }}" ]; then
            echo "SERVER_PASSWORD is missing"
            exit 1
          fi
          echo "All secrets exist"

      - name: Deploy to VPS using SSH password
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /var/www/laravel-docker
            ./deploy-docker.sh
